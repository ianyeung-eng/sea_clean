<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Micro:bit 智慧追蹤終端 - 鏡像切換版</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
        }
        .container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }
        video { position: absolute; opacity: 0; pointer-events: none; }
        canvas { display: block; touch-action: none; }

        .controls {
            position: fixed; top: 10px; left: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px; border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            z-index: 20; width: 220px; 
        }
        
        /* 配合新增的鏡像開關，將監控面板再次下移至 500px */
        .monitor {
            position: fixed; top: 500px; left: 10px;
            background: rgba(0, 20, 0, 0.9);
            padding: 10px; border-radius: 10px;
            border: 1px solid #00FF00;
            z-index: 20; width: 220px; color: #00FF00;
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }

        #status { font-size: 0.85em; font-weight: bold; color: #d9534f; margin-bottom: 12px; }
        
        .color-display-box {
            display: flex; align-items: center; gap: 10px;
            background: #f0f0f0; padding: 8px; border-radius: 8px;
            margin-bottom: 12px; border: 1px solid #ddd;
        }
        #colorPreview { 
            display: inline-block; width: 28px; height: 28px; 
            border: 2px solid #555; border-radius: 6px; background-color: transparent; 
        }
        #colorText { font-family: monospace; font-size: 0.8em; font-weight: bold; color: #333; }

        .slider-box { margin-bottom: 12px; }
        .slider-label { font-size: 0.75em; color: #333; font-weight: bold; display: flex; justify-content: space-between; }
        input[type=range] { width: 100%; margin-top: 5px; }

        .switch-box {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; padding-top: 5px; border-top: 1px solid #ddd;
        }
        .switch-text { font-size: 0.85em; font-weight: bold; color: #333; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #28A745; }
        input:checked + .slider:before { transform: translateX(22px); }

        #connectBluetooth {
            width: 100%; padding: 10px; background: #007bff; color: white;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9em;
            transition: background 0.3s;
            margin-top: 5px;
        }
        #connectBluetooth:active { background: #0056b3; }
        
        .monitor-label { font-size: 0.6em; color: #00AA00; margin-bottom: 2px; text-transform: uppercase; transition: color 0.3s; }
        #sent-data { font-size: 1.1em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <div id="status">鏡頭啟動中...</div>
        
        <div class="color-display-box">
            <span id="colorPreview"></span>
            <div style="display: flex; flex-direction: column;">
                <span style="font-size: 0.7em; color: #666; font-weight: bold;">目前鎖定顏色:</span>
                <span id="colorText">尚未選擇</span>
            </div>
        </div>
        
        <div class="slider-box">
            <div class="slider-label">
                <span>畫面光度 (Brightness)</span>
            </div>
            <input type="range" id="brightness" min="50" max="250" value="100">
            <div class="slider-label" style="color: #888; font-size: 0.65em; margin-top: 2px;">
                <span>暗</span>
                <span>亮</span>
            </div>
        </div>

        <div class="slider-box">
            <div class="slider-label">
                <span>調整容錯率 (Sensitivity)</span>
            </div>
            <input type="range" id="tolerance" min="10" max="180" value="70">
            <div class="slider-label" style="color: #888; font-size: 0.65em; margin-top: 2px;">
                <span>低 (嚴格)</span>
                <span>高 (寬鬆)</span>
            </div>
        </div>

        <div class="switch-box">
            <span class="switch-text">鏡像畫面 (Mirror)</span>
            <label class="switch">
                <input type="checkbox" id="mirror-switch" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-box" style="border-top: none; padding-top: 0;">
            <span class="switch-text">傳送座標數據</span>
            <label class="switch">
                <input type="checkbox" id="tx-switch">
                <span class="slider"></span>
            </label>
        </div>

        <div id="bt-status" style="font-size: 0.7em; margin-bottom: 8px; text-align: center; color: #666;">BT: 未連線</div>
        <button id="connectBluetooth">📶 連線 Micro:bit</button>
    </div>

    <div class="monitor" id="monitorBox">
        <div class="monitor-label" id="monitorLabel">Output Terminal:</div>
        <div id="sent-data">PAUSED</div>
    </div>
    
    <div class="container">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="output"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const colorPreview = document.getElementById('colorPreview');
        const colorText = document.getElementById('colorText');
        const toleranceInput = document.getElementById('tolerance');
        const brightnessInput = document.getElementById('brightness');
        const mirrorSwitch = document.getElementById('mirror-switch'); // 新增鏡像變數
        const txSwitch = document.getElementById('tx-switch');
        
        const statusText = document.getElementById('status');
        const btStatus = document.getElementById('bt-status');
        const sentDataDisplay = document.getElementById('sent-data');
        const connectBtn = document.getElementById('connectBluetooth');
        const monitorBox = document.getElementById('monitorBox');
        const monitorLabel = document.getElementById('monitorLabel');

        let targetR = null, targetG = null, targetB = null;
        let isTracking = false;

        // 藍牙變數
        const UART_SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const UART_RX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
        let uBitDevice = null; 
        let rxCharacteristic = null;
        let isWriting = false; 
        let lastSendTime = 0;

        txSwitch.addEventListener('change', async (e) => {
            if (!e.target.checked) {
                sentDataDisplay.innerText = "[STOP SENT]";
                sentDataDisplay.style.color = "#ffae00";
                monitorBox.style.borderColor = "#ffae00";
                monitorLabel.style.color = "#ffae00";
                monitorLabel.innerText = "Output Terminal:";

                if (rxCharacteristic) {
                    try {
                        await rxCharacteristic.writeValue(new TextEncoder().encode("stop\n"));
                    } catch (err) {
                        console.error("發送 stop 失敗:", err);
                    }
                }
            }
        });

        function onDisconnected() {
            btStatus.innerText = "⚠️ 藍牙已斷線";
            btStatus.style.color = "#d9534f";
            
            rxCharacteristic = null; 
            
            connectBtn.style.display = "block";
            connectBtn.style.background = "#f0ad4e"; 
            connectBtn.innerText = "🔄 重新連線 (重試)";

            sentDataDisplay.innerText = "[DISCONNECTED]";
            sentDataDisplay.style.color = "#d9534f";
            monitorBox.style.borderColor = "#d9534f";
            monitorLabel.style.color = "#d9534f";
            monitorLabel.innerText = "CONNECTION LOST:";
            
            txSwitch.checked = false; 
        }

        async function connectBluetooth() {
            try {
                btStatus.innerText = "連線中...";
                btStatus.style.color = "#007bff";

                if (!uBitDevice) {
                    uBitDevice = await navigator.bluetooth.requestDevice({
                        filters: [{ namePrefix: "BBC micro:bit" }],
                        optionalServices: [UART_SERVICE_UUID]
                    });
                    uBitDevice.addEventListener("gattserverdisconnected", onDisconnected);
                }

                const server = await uBitDevice.gatt.connect();
                const service = await server.getPrimaryService(UART_SERVICE_UUID);
                rxCharacteristic = await service.getCharacteristic(UART_RX_CHARACTERISTIC_UUID);
                
                btStatus.innerText = "✅ 已連線";
                btStatus.style.color = "#28A745";
                
                connectBtn.style.display = "none";
                connectBtn.style.background = "#007bff"; 
                connectBtn.innerText = "📶 連線 Micro:bit";
                
            } catch (err) {
                btStatus.innerText = "❌ 連接失敗";
                btStatus.style.color = "#d9534f";
                console.error(err);
                uBitDevice = null; 
                connectBtn.style.background = "#d9534f";
                connectBtn.innerText = "重新搜尋裝置";
            }
        }
        connectBtn.addEventListener("click", connectBluetooth);

        function drawRulers() {
            const midX = canvas.width / 2;
            const midY = canvas.height / 2;
            ctx.strokeStyle = "rgba(0, 255, 0, 0.3)";
            ctx.fillStyle = "rgba(0, 255, 0, 0.6)";
            ctx.lineWidth = 1;
            ctx.font = "10px monospace";

            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(midX, 0); ctx.lineTo(midX, canvas.height);
            ctx.moveTo(0, midY); ctx.lineTo(canvas.width, midY);
            ctx.stroke();
            ctx.setLineDash([]);

            for (let offset = 0; offset <= midX; offset += 50) {
                [midX + offset, midX - offset].forEach(x => {
                    const val = Math.round(x - midX);
                    const isBig = val % 100 === 0;
                    ctx.beginPath(); ctx.moveTo(x, midY-5); ctx.lineTo(x, midY+5); ctx.stroke();
                    if (isBig) ctx.fillText(val, x - 8, midY + 18);
                });
            }
            for (let offset = 0; offset <= midY; offset += 50) {
                [midY - offset, midY + offset].forEach(y => {
                    const val = Math.round(midY - y);
                    const isBig = val % 100 === 0;
                    ctx.beginPath(); ctx.moveTo(midX-5, y); ctx.lineTo(midX+5, y); ctx.stroke();
                    if (isBig && val !== 0) ctx.fillText(val, midX + 10, y + 3);
                });
            }
        }

        async function sendToMicrobit(tx, ty, isLost = false) {
            if (!rxCharacteristic) return; 

            if (!txSwitch.checked) return;

            const dataStr = `${tx},${ty}`;
            sentDataDisplay.innerText = dataStr; 
            
            if (isLost) {
                sentDataDisplay.style.color = "#FF0000";
                monitorBox.style.borderColor = "#FF0000";
                monitorLabel.style.color = "#FF0000";
                monitorLabel.innerText = "TARGET LOST - Output:";
            } else {
                sentDataDisplay.style.color = "#00FF00";
                monitorBox.style.borderColor = "#00FF00";
                monitorLabel.style.color = "#00AA00";
                monitorLabel.innerText = "Output Terminal:";
            }

            if (isWriting) return;
            const now = Date.now();
            if (now - lastSendTime < 150) return; 

            isWriting = true;
            lastSendTime = now;
            try {
                await rxCharacteristic.writeValue(new TextEncoder().encode(dataStr + "\n"));
            } catch (err) {
                console.error("寫入失敗:", err);
            } finally {
                isWriting = false; 
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function setupWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
                video.addEventListener('loadeddata', () => {
                    video.play();
                    statusText.innerText = "請點選目標顏色";
                    processFrame();
                });
            } catch (error) { statusText.innerText = "相機權限受阻"; }
        }

        function handleSelectColor(e) {
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const pixel = ctx.getImageData(clientX, clientY, 1, 1).data;
            targetR = pixel[0]; targetG = pixel[1]; targetB = pixel[2];
            
            colorPreview.style.backgroundColor = `rgb(${targetR}, ${targetG}, ${targetB})`;
            colorText.innerText = `RGB(${targetR}, ${targetG}, ${targetB})`;
            
            isTracking = true;
        }
        canvas.addEventListener('touchstart', handleSelectColor, false);
        canvas.addEventListener('mousedown', handleSelectColor, false);

        function processFrame() {
            if (video.readyState === 4) {
                
                ctx.save(); 
                
                // 【關鍵修改】：依據開關決定是否反轉 X 軸
                if (mirrorSwitch.checked) {
                    ctx.scale(-1, 1);
                    ctx.filter = `brightness(${brightnessInput.value}%)`; 
                    ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
                } else {
                    ctx.filter = `brightness(${brightnessInput.value}%)`; 
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                }
                
                ctx.restore(); 

                drawRulers();

                if (isTracking) {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    let minX = canvas.width, maxX = 0, minY = canvas.height, maxY = 0, matchCount = 0;
                    const tolerance = parseInt(toleranceInput.value);

                    for (let y = 0; y < canvas.height; y += 6) {
                        for (let x = 0; x < canvas.width; x += 6) {
                            const i = (y * canvas.width + x) * 4;
                            const diff = Math.abs(data[i]-targetR) + Math.abs(data[i+1]-targetG) + Math.abs(data[i+2]-targetB);
                            if (diff < tolerance) {
                                if (x < minX) minX = x; if (x > maxX) maxX = x;
                                if (y < minY) minY = y; if (y > maxY) maxY = y;
                                matchCount++;
                            }
                        }
                    }

                    const midX = canvas.width / 2;
                    const midY = canvas.height / 2;

                    if (matchCount > 10) {
                        const cx = (minX + maxX) / 2;
                        const cy = (minY + maxY) / 2;
                        
                        const tx = Math.round(cx - midX);
                        const ty = Math.round(midY - cy);

                        ctx.strokeStyle = "#00FF00"; ctx.lineWidth = 2;
                        ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);
                        ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fillStyle = "#00FF00"; ctx.fill();

                        ctx.fillStyle = "white"; ctx.font = "bold 14px monospace";
                        ctx.fillText(`${tx}, ${ty}`, cx + 10, cy - 10);

                        sendToMicrobit(tx, ty, false);
                        
                    } else {
                        ctx.fillStyle = "#FF0000"; 
                        ctx.font = "bold 24px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText("TARGET LOST", midX, 40); 
                        ctx.textAlign = "left"; 

                        sendToMicrobit(0, 0, true);
                    }
                }
            }
            requestAnimationFrame(processFrame);
        }

        setupWebcam();
    </script>
</body>
</html>
